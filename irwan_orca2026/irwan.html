<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Profil</title>

<style>

body{
    background:#0f2027;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    font-family:Arial;
}

img{
    width:300px;
    border-radius:20px;
    margin-bottom:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    color:black;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:white;
}

</style>

</head>

<body>
    <img src="irwan.jpg">

    <button onclick="history.back()">Kembali</button>
</body>
</html>
